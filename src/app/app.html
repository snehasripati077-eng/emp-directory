<div class="container">

  <h1>Employee Directory</h1>

  <div class="button-group">
    <button (click)="loadEmployees()">
      Load Employees
    </button>

    <button (click)="clearEmployees()">
      Clear Employees
    </button>
  </div>

  <table *ngIf="employees.length > 0">

    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Department</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let emp of employees">

        <td>{{ emp.id }}</td>
        <td>{{ emp.name }}</td>
        <td>{{ emp.department }}</td>

      </tr>

    </tbody>

  </table>

  <h2 *ngIf="employees.length === 0">
    No Employees Available
  </h2>

</div>
